<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - String Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-en: 'Plus Jakarta Sans', sans-serif;
      --font-ar: 'Noto Sans Arabic', sans-serif;
    }
    body {
      font-family: var(--font-en);
      background-color: #ffffff;
      color: #000000;
      overflow-x: hidden;
    }
    [dir="rtl"] {
      font-family: var(--font-ar);
    }

    /* Grainy Texture for Premium Feel */
    .bg-grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Selection Highlight */
    ::selection {
      background: #ed3b91;
      color: white;
    }
  </style>
</head>
<body>
  <div class="bg-grain"></div>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
