<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-en: 'Plus Jakarta Sans', sans-serif;
      --font-ar: 'Noto Sans Arabic', sans-serif;
    }
    body {
      font-family: var(--font-en);
      background-color: #ffffff;
      color: #000000;
      overflow-x: hidden;
    }
    [dir="rtl"] {
      font-family: var(--font-ar);
    }

    /* Grainy Texture for Premium Feel */
    .bg-grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Selection Highlight */
    ::selection {
      background: #ed3b91;
      color: white;
    }

    /* Gamification Animations */
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-40px); }
    }
    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(40px); }
    }
    @keyframes correctPulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      10%, 50%, 90% { transform: translateX(-4px); }
      30%, 70% { transform: translateX(4px); }
    }
    @keyframes bounce {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }
    @keyframes fireFlicker {
      0%, 100% { transform: scale(1) rotate(-2deg); filter: brightness(1); }
      25% { transform: scale(1.05) rotate(1deg); filter: brightness(1.2); }
      50% { transform: scale(0.98) rotate(-1deg); filter: brightness(1.1); }
      75% { transform: scale(1.03) rotate(2deg); filter: brightness(1.3); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes xpFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(0.8); }
    }
    @keyframes streakGlow {
      0%, 100% { text-shadow: 0 0 5px rgba(245, 158, 11, 0.5); }
      50% { text-shadow: 0 0 20px rgba(245, 158, 11, 0.8), 0 0 40px rgba(237, 59, 145, 0.3); }
    }

    .animate-slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-slide-in-left { animation: slideInLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-correct-pulse { animation: correctPulse 0.6s ease-out; }
    .animate-wrong-shake { animation: wrongShake 0.5s ease-out; }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out both; }
    .animate-xp-float { animation: xpFloat 1s ease-out forwards; }
    .animate-streak-glow { animation: streakGlow 1.5s ease-in-out infinite; }
    .animate-fire-flicker { animation: fireFlicker 0.4s ease-in-out infinite; }

    [dir="rtl"] .animate-slide-in-right { animation-name: slideInLeft; }
    [dir="rtl"] .animate-slide-in-left { animation-name: slideInRight; }

    /* Print styles */
    @media print {
      body { background: white !important; margin: 0; }
      .bg-grain, .no-print { display: none !important; }
      /* During print: hide the main app, show the portal */
      body.printing #root { display: none !important; }
      body.printing #print-portal { display: block !important; padding: 20px 24px; }
      .print-question { break-inside: avoid; page-break-inside: avoid; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; }
      .print-answer-key { display: none; }
      body.print-answers .print-answer-key { display: block !important; color: #16a34a; font-weight: 600; margin-top: 0.5rem; }
      .print-citation { color: #6882a9; font-size: 0.85rem; font-style: italic; }
      @page { margin: 0.6in; }
    }
    /* On screen, the portal is hidden */
    #print-portal { display: none; }
  </style>
</head>
<body>
  <div class="bg-grain"></div>
  <div id="root"></div>
  <div id="print-portal"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
